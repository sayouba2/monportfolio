<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <title>Sayouba Ouedraogo — Portfolio</title>
        <!-- spa-github-pages: stash the requested path in the query string and bounce to index.html -->
        <script>
        (function(l) {
            var pathSegmentsToKeep = 0;
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        }(window.location))
        </script>
    </head>
    <body></body>
</html>
